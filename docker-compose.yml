services:

  # ── React frontend ────────────────────────────────────────────────────────────
  template-app:
    build:
      context: .
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
        VITE_SOCKET_URL: ${VITE_SOCKET_URL:-}
        VITE_SOCKET_PATH: ${VITE_SOCKET_PATH:-/socket.io}
    container_name: template-app
    restart: unless-stopped
    networks:
      - web

networks:
  web:
    external: true